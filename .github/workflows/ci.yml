name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup
      - run: |
          pnpm deps:sync
          pnpm sync
          pnpm gen
          pnpm fmt

      - id: diff
        run: |
          if ! git diff --quiet; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "────────────────────────────────────────"
            echo "The following files are not up to date"
            echo "────────────────────────────────────────"
            echo ""
            git diff --name-only \
            | sed 's/^/  - /'
            echo ""
            echo "────────────────────────────────────────"
            echo "Actual diff:"
            echo "────────────────────────────────────────"
            echo ""
            git --no-pager diff
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected. All generated files are up to date."
          fi

      - if: steps.diff.outputs.changed == 'true' && github.event_name != 'pull_request'
        run: exit 1

      - if: steps.diff.outputs.changed == 'true' && github.event_name == 'pull_request'
        uses: autofix-ci/action@v1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup
      - run: |
          pnpm build
          pnpm checks
          pnpm lint
          pnpm fmt:check
          pnpm typecheck

  tests:
    runs-on: ubuntu-latest
    name: Node.js ${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}
      - run: |
          pnpm build
          pnpm test
      - uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: matrix.node-version == 22
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  typedoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup
      - run: |
          pnpm build
          pnpm build:docs

  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/setup
      - run: |
          pnpm build
      - name: Release Preview
        run: pnpm dlx pkg-pr-new publish './packages/**' --packageManager=npm,pnpm,yarn,bun
